<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>孩子为何更愿意听朋友和网络的建议？</title>
  <style>
    :root{--ink:#24312d;--muted:#64716c;--paper:#fcfbf7;--line:#e6e1d7;--sage:#eef5ef;--rose:#fbefeb}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:17px/1.9 ui-serif,"Songti SC","STSong","Noto Serif CJK SC",serif}header{max-width:820px;margin:auto;padding:78px 28px 48px;text-align:center}.eyebrow{font:700 14px/1.4 system-ui,sans-serif;color:#668172;letter-spacing:.12em}h1{font-size:clamp(31px,5vw,52px);line-height:1.26;letter-spacing:-.04em;margin:16px 0}.sub{color:var(--muted);font-size:16px}main{max-width:780px;margin:auto;padding:0 20px 72px}.message{background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px 30px;margin:25px 0;box-shadow:0 6px 20px #22352809}.message.user{background:var(--rose);margin-left:8%}.role{font:700 14px/1.3 system-ui,sans-serif;letter-spacing:.05em;color:#527461;margin-bottom:16px}.user .role{color:#9b6255}p{margin:0 0 18px}h2{font-size:23px;line-height:1.45;margin:36px 0 13px}h3{font-size:19px;margin:28px 0 10px}blockquote{margin:22px 0;padding:14px 20px;border-left:3px solid #8aa894;background:var(--sage);color:#365042}ul{margin:0 0 19px;padding-left:1.4em}footer{text-align:center;color:var(--muted);border-top:1px solid var(--line);padding:28px;font:14px system-ui,sans-serif}@media(max-width:600px){body{font-size:16px}header{padding:52px 22px 34px}main{padding:0 14px 42px}.message{padding:22px 20px}.message.user{margin-left:0}h2{font-size:21px}}
  </style>
</head>
<body>
<header><div class="eyebrow">一段关于亲子关系的对话</div><h1>孩子为何更愿意听朋友和网络的建议？</h1><p class="sub">以下为原对话内容，保留提问、回应与后续修正。</p></header><main id="conversation"></main><footer>原对话整理为阅读页面</footer>
<script>
const out=document.querySelector('#conversation');fetch('孩子对长辈建议与朋友网络建议_原对话.txt').then(r=>r.text()).then(text=>{let message;const add=(tag,text,cls='')=>{const e=document.createElement(tag);e.textContent=text;if(cls)e.className=cls;message.append(e)};for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;if(line==='用户：'||line==='ChatGPT：'){message=document.createElement('section');message.className='message '+(line==='用户：'?'user':'assistant');out.append(message);add('div',line.slice(0,-1),'role');continue}if(!message)continue;if(line.startsWith('### ')){add('h2',line.slice(4));continue}if(line.startsWith('#### ')){add('h3',line.slice(5));continue}if(line.startsWith('> ')){add('blockquote',line.slice(2));continue}if(line.startsWith('- ')){let list=message.lastElementChild;if(!list||list.tagName!=='UL'){list=document.createElement('ul');message.append(list)}const li=document.createElement('li');li.textContent=line.slice(2);list.append(li);continue}add('p',line.replace(/\*\*/g,''))}});
</script>
</body></html>
